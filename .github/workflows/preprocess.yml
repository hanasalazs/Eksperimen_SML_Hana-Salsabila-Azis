name: Data Preprocessing Automation

on:
  push:
    branches: [ main, master ]

jobs:
  preprocess:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python 3.12.7
      uses: actions/setup-python@v4
      with:
        python-version: '3.12.7'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas scikit-learn

    - name: Run Preprocessing Script
      run: |
        python preprocessing/automate_Hana-Salsabila-Azis.py

    - name: Upload Processed Artifact
      uses: actions/upload-artifact@v4
      with:
        name: student-clean-dataset
        path: preprocessing/namadataset_preprocessing/student_clean.csv
